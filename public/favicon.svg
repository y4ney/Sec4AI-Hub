<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M32 4L56 16v20Q56 52 32 60 8 52 8 36V16Z" fill="#0d1117" stroke="url(#sg)" stroke-width="2.5"/>
  <path d="M32 8L52 18v17Q52 49 32 56 12 49 12 35V18Z" fill="url(#ig)"/>

  <!-- Neural connections from center(32,26) to 5 outer nodes -->
  <line x1="32" y1="26" x2="32" y2="14" stroke="#00e5ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="26" x2="20" y2="20" stroke="#00ff41" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="26" x2="44" y2="20" stroke="#00ff41" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="26" x2="23" y2="37" stroke="#00ff41" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="26" x2="41" y2="37" stroke="#00ff41" stroke-width="1.2" opacity="0.5"/>

  <!-- Outer nodes (green) -->
  <circle cx="32" cy="13" r="2.8" fill="#00ff41" opacity="0.85"/>
  <circle cx="19" cy="19" r="2.8" fill="#00ff41" opacity="0.85"/>
  <circle cx="45" cy="19" r="2.8" fill="#00ff41" opacity="0.85"/>
  <circle cx="22" cy="38" r="2.8" fill="#00ff41" opacity="0.85"/>
  <circle cx="42" cy="38" r="2.8" fill="#00ff41" opacity="0.85"/>

  <!-- Center node (cyan, larger) -->
  <circle cx="32" cy="26" r="4" fill="#00e5ff"/>
  <circle cx="32" cy="26" r="7" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>

  <!-- Sec4AI label -->
  <text x="32" y="52" text-anchor="middle" font-family="monospace" font-size="7.5" font-weight="700"
        fill="#00ff41" letter-spacing="0.8" opacity="0.85">Sec4AI</text>
</svg>
