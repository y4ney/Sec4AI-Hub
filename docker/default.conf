server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CIS: Disable unnecessary HTTP methods
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
        return 405;
    }

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # Security: Cache static assets, immutable content hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Security: No cache for HTML (SPA entry point)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Static file types
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback: all paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom 404 (SPA handles routing)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
